name: "scanservjs Scan Server"
version: "1.1.4"
slug: "scanservjs"
description: "scanservjs Web-UI fuer Scanner (SANE) - optional mit Brother brscan4 Auto-Install und MFC-L2700DW Netzwerk-Registrierung."
url: "https://github.com/magicx78/ha-scanservjs-addon"

arch:
  - amd64

init: false
startup: services
boot: auto

ingress: true
ingress_port: 8080
panel_icon: "mdi:scanner"
panel_title: "scanservjs"
host_network: true

ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "scanservjs Web interface"

icon: icon.png
logo: icon.png
apparmor: true
usb: true
homeassistant_api: true

map:
  - type: ssl
  - type: share
    read_only: false
  - type: media
    read_only: false

options:
  saned_net_hosts: ""
  airscan_devices: ""
  scanimage_list_ignore: false
  devices: ""
  ocr_lang: "deu+eng"
  copy_scans_to_mode: "custom"
  copy_scans_to: "/share/paperless/consume"
  generic_scanner_ip: ""
  sorter_enable: false
  sorter_confidence_threshold: 75
  sorter_provider: "anthropic"
  sorter_model: "claude-sonnet-4-20250514"
  openai_api_key: ""
  anthropic_api_key: ""
  paperless_url: ""
  paperless_token: ""
  sorter_inbox_dir: "/data/output"
  sorter_review_dir: "/data/output"
  sorter_processed_dir: "/data/processed"
  sorter_state_dir: "/data/sorter-state"

  brother_enable: false
  brother_accept_eula: false
  brother_driver_source: "auto"
  brother_driver_url: ""
  brother_driver_sha256: ""
  brother_driver_local_path: "/share/brscan4.amd64.deb"

  brother_register_scanner: true
  brother_scanner_name: "Brother"
  brother_scanner_model: "MFC-L2700DW"
  brother_scanner_ip: ""
  brother_scanner_nodename: ""
  brother_overwrite_existing: false
  brother_button_output_dir: ""
  brother_button_default_resolution: 300
  brother_button_scan_format: "jpeg"
  brother_image_output_format: "jpg"
  brother_ocr_output_format: "pdf"
  brother_copy_file_to_target: true
  brother_copy_email_to_target: true
  brother_copy_image_to_target: false
  brother_copy_ocr_to_target: false
  brother_button_scan_args_file: ""
  brother_button_scan_args_email: ""
  brother_trigger_image_webhook_id: ""
  brother_trigger_ocr_webhook_id: ""

schema:
  saned_net_hosts: str?
  airscan_devices: str?
  scanimage_list_ignore: bool?
  devices: str?
  ocr_lang: str?
  copy_scans_to_mode: list(auto|paperless|custom)?
  copy_scans_to: str?
  generic_scanner_ip: str?
  sorter_enable: bool?
  sorter_confidence_threshold: int?
  sorter_provider: list(anthropic|openai)?
  sorter_model: str?
  openai_api_key: password?
  anthropic_api_key: password?
  paperless_url: str?
  paperless_token: password?
  sorter_inbox_dir: str?
  sorter_review_dir: str?
  sorter_processed_dir: str?
  sorter_state_dir: str?

  brother_enable: bool?
  brother_accept_eula: bool?
  brother_driver_source: list(auto|url|local)?
  brother_driver_url: str?
  brother_driver_sha256: str?
  brother_driver_local_path: str?
  brother_register_scanner: bool?
  brother_scanner_name: str?
  brother_scanner_model: str?
  brother_scanner_ip: str?
  brother_scanner_nodename: str?
  brother_overwrite_existing: bool?
  brother_button_output_dir: str?
  brother_button_default_resolution: int?
  brother_button_scan_format: str?
  brother_image_output_format: list(native|jpg|pdf|tiff)?
  brother_ocr_output_format: list(native|jpg|pdf|tiff)?
  brother_copy_file_to_target: bool?
  brother_copy_email_to_target: bool?
  brother_copy_image_to_target: bool?
  brother_copy_ocr_to_target: bool?
  brother_button_scan_args_file: str?
  brother_button_scan_args_email: str?
  brother_trigger_image_webhook_id: str?
  brother_trigger_ocr_webhook_id: str?




