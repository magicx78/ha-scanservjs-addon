name: Build

'on':
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: YAML lint
        run: yamllint -c .yamllint.yml .

      - name: Shell syntax check
        run: bash -n scanservjs/run.sh

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./scanservjs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Node syntax check
        run: node --check scanservjs/config.local.js

      - name: Docker build
        run: docker build --build-arg BUILD_FROM=sbs20/scanservjs:v3.0.3 -t ha-scanservjs-addon:test ./scanservjs

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: ha-scanservjs-addon:test
          format: sarif
          output: ${{ github.workspace }}/trivy-results.sarif
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Check Trivy SARIF output
        id: trivy_sarif
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          ls -la "${GITHUB_WORKSPACE}"
          if [ -f "${GITHUB_WORKSPACE}/trivy-results.sarif" ]; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "Expected SARIF file was not created" >&2
          fi

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.trivy_sarif.outputs.exists == 'true'
        with:
          sarif_file: ${{ github.workspace }}/trivy-results.sarif
