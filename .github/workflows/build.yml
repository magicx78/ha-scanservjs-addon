name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: YAML lint
        run: yamllint -c .yamllint.yml .

      - name: Shell syntax check
        run: bash -n scanservjs/run.sh

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./scanservjs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Node syntax check
        run: node --check scanservjs/config.local.js

      - name: Docker build
        run: docker build --build-arg BUILD_FROM=sbs20/scanservjs:v3.0.3 -t ha-scanservjs-addon:test ./scanservjs

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ha-scanservjs-addon:test
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
