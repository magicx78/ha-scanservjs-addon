configuration:
  # --- KI / Claude ---
  anthropic_api_key:
    name: Anthropic API-Schlüssel
    description: Dein Claude API-Schlüssel von console.anthropic.com. Erforderlich für die KI-Dokumentenklassifikation.
  paperless_url:
    name: Paperless-ngx URL
    description: Interne URL deiner Paperless-ngx-Instanz, z.B. http://ca5234a0-paperless-ngx:8000.
  paperless_token:
    name: Paperless-ngx API-Token
    description: API-Token aus deinem Paperless-ngx-Profil (Einstellungen → API-Token).
  ha_notify_target:
    name: HA-Benachrichtigungsziel
    description: Home Assistant Benachrichtigungsdienst für KI-Klassifikationsergebnisse, z.B. notify.persistent_notification.
  min_konfidenz:
    name: Mindest-Konfidenz
    description: Mindestkonfidenzwert (0,0–1,0) damit eine KI-Klassifikation angewendet wird. Standard ist 0,7.
  ai_poll_interval:
    name: KI-Abfrageintervall (Sekunden)
    description: Wie oft der KI-Worker neue unklassifizierte Dokumente in Paperless-ngx prüft. Standard sind 5 Sekunden.
  # --- Scanner ---
  saned_net_hosts:
    name: SANE-Netzwerk-Hosts
    description: Semikolon-getrennte Hosts, die an /etc/sane.d/net.conf angehängt werden.
  airscan_devices:
    name: Airscan-Geräte
    description: Semikolon-getrennte Einträge für /etc/sane.d/airscan.conf.
  scanimage_list_ignore:
    name: scanimage-Liste ignorieren
    description: Aktiviert bei Bedarf die scanimage-Umgebungsoption zum Ignorieren der Geräteliste.
  devices:
    name: Gerätefilter
    description: Optionaler Scanner-Filter, der an scanservjs weitergereicht wird.
  ocr_lang:
    name: OCR-Sprachen
    description: Tesseract-OCR-Sprachen, z.B. deu+eng.
  copy_scans_to_mode:
    name: Zielverzeichnis-Modus
    description: auto erkennt /share/paperless/consume, paperless erzwingt es, custom nutzt das Wunschverzeichnis.
  copy_scans_to:
    name: Wunschverzeichnis für Scans
    description: Zielverzeichnis für fertige Scans im custom-Modus oder als Fallback bei auto.
  generic_scanner_ip:
    name: Generische Scanner-IP (AirScan-Fallback)
    description: Optionale Scanner-IP für automatische eSCL/WSD-Einträge, wenn airscan_devices leer ist. Geeignet für HP/Epson/Canon/Xerox MFP ohne Brother-Modus.
  # --- Brother ---
  brother_enable:
    name: Brother-Unterstützung aktivieren
    description: Aktiviert die optionale Brother-brscan4-Einrichtungslogik.
  brother_accept_eula:
    name: Brother-EULA akzeptieren
    description: Muss aktiviert sein, bevor proprietäre Brother-Treiber heruntergeladen oder installiert werden.
  brother_driver_source:
    name: Brother-Treiberquelle
    description: Wählt automatische Auflösung, eine URL oder eine lokale Datei.
  brother_driver_url:
    name: Brother-Treiber-URL
    description: Direkte URL zu einem Brother-brscan4-Debian-Paket.
  brother_driver_sha256:
    name: Brother-Treiber-SHA256
    description: Optionaler SHA256-Prüfwert für das heruntergeladene Paket.
  brother_driver_local_path:
    name: Brother-Treiber lokaler Pfad
    description: Lokaler Pfad zu einem Brother-brscan4-Debian-Paket, z.B. unter /share.
  brother_register_scanner:
    name: Brother-Scanner registrieren
    description: Führt beim Start die brsaneconfig4-Registrierung aus.
  brother_scanner_name:
    name: Brother-Scannername
    description: Registrierungsname für den Brother-Scanner.
  brother_scanner_model:
    name: Brother-Scannermodell
    description: Brother-Modellbezeichnung für brsaneconfig4.
  brother_scanner_ip:
    name: Brother-Scanner-IP
    description: IP-Adresse für die Brother-Netzwerkregistrierung.
  brother_scanner_nodename:
    name: Brother-Scanner-Nodename
    description: Optionaler Nodename anstelle einer IP-Adresse.
  brother_overwrite_existing:
    name: Vorhandene Brother-Registrierung überschreiben
    description: Entfernt einen vorhandenen Brother-Eintrag vor der Neuregistrierung.
  brother_button_output_dir:
    name: Brother-Button-Ausgabeverzeichnis
    description: Optionales Verzeichnis für Brother-Button-Scans. Leer = scanservjs-Datenordner (sichtbar unter Dateien-Tab).
  brother_button_default_resolution:
    name: Brother-Standardauflösung (DPI)
    description: "Standard-DPI für Brother-Button-Scans. Empfehlung für OCR: 300 (600 nur für sehr kleine Schrift)."
  brother_button_scan_format:
    name: Brother-Tasten-Scanformat
    description: Ausgabeformat für Brother Scan to File und Scan to Email, z.B. jpeg oder png.
  brother_image_output_format:
    name: Brother-Image-Ausgabeformat
    description: Ausgabeformat für Brother Scan to Image (native, jpg, pdf, tiff).
  brother_ocr_output_format:
    name: Brother-OCR-Ausgabeformat
    description: Ausgabeformat für Brother Scan to OCR (native, jpg, pdf, tiff).
  brother_copy_file_to_target:
    name: Datei nach Ziel kopieren
    description: true = Scan to File wird nach copy_scans_to kopiert (z.B. Paperless).
  brother_copy_email_to_target:
    name: E-Mail nach Ziel kopieren
    description: true = Scan to Email wird nach copy_scans_to kopiert.
  brother_copy_image_to_target:
    name: Image nach Ziel kopieren
    description: false = Image bleibt im Dateien-Tab; true = auch nach copy_scans_to kopieren.
  brother_copy_ocr_to_target:
    name: OCR nach Ziel kopieren
    description: false = OCR bleibt im Dateien-Tab; true = auch nach copy_scans_to kopieren.
  brother_button_scan_args_file:
    name: Brother-Datei-Taste Scanargumente
    description: Optionale zusätzliche scanimage-Argumente für Scan to File, durch Leerzeichen getrennt.
  brother_button_scan_args_email:
    name: Brother-E-Mail-Taste Scanargumente
    description: Optionale zusätzliche scanimage-Argumente für Scan to Email, durch Leerzeichen getrennt.
  brother_trigger_image_webhook_id:
    name: Brother-Image-Webhook-ID
    description: Optionale Home-Assistant-Webhook-ID für die Brother-Taste Scan to Image.
  brother_trigger_ocr_webhook_id:
    name: Brother-OCR-Webhook-ID
    description: Optionale Home-Assistant-Webhook-ID für die Brother-Taste Scan to OCR.
