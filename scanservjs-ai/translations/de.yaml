configuration:
  claude_access_type:
    name: Claude-Zugangstyp
    description: "Art des Claude-Zugangs: api_key fuer API-Schluessel, subscription fuer bestehende Claude-Subscription, none fuer deaktiviert."
  anthropic_api_key:
    name: Anthropic API-Schluessel
    description: "API-Key fuer Claude AI. Erforderlich wenn claude_access_type auf api_key gesetzt ist."
  paperless_url:
    name: Paperless-ngx URL
    description: "URL zur Paperless-ngx Instanz, z.B. http://ca5234a0-paperless-ngx:8000"
  paperless_token:
    name: Paperless-ngx Token
    description: "API-Token fuer Paperless-ngx (unter Admin > API Tokens generieren)."
  min_konfidenz:
    name: Minimale KI-Konfidenz
    description: "Schwellwert (0.0–1.0) ab dem die KI-Klassifikation als vertrauenswuerdig gilt. Unter diesem Wert wird [Pruefen]-Tag gesetzt."
  ai_poll_interval:
    name: KI-Poll-Intervall (Minuten)
    description: "Wie oft (in Minuten) nach neuen Dokumenten in Paperless gesucht wird. Standard: 5."
  ha_url:
    name: Home Assistant URL
    description: "URL zur Home Assistant Instanz. Wird automatisch ueber Supervisor gesetzt."
  ha_token:
    name: Home Assistant Token
    description: "Long-Lived Access Token fuer HA. Wird automatisch ueber Supervisor gesetzt."
  ha_notify_target:
    name: HA Benachrichtigungs-Ziel
    description: "Notify-Service fuer KI-Benachrichtigungen, z.B. notify.persistent_notification oder notify.mobile_app_phone."
  ha_automation_entity_id:
    name: HA Automation Entity-ID
    description: "Optionale Entity-ID einer HA-Automation die bei neuen Dokumenten getriggert wird."
  cache_enabled:
    name: KI-Cache aktivieren
    description: "Aktiviert den Classification-Cache (SQLite). Reduziert API-Calls bei wiederholten Dokumenten."
  cache_db_path:
    name: Cache-Datenbankpfad
    description: "Pfad zur SQLite-Cache-Datenbank. Standard: /data/cache_classifications.db"
  cache_ttl_seconds:
    name: Cache-TTL (Sekunden)
    description: "Gueltigkeitsdauer gecachter Klassifikationen in Sekunden. Standard: 86400 (24 Stunden)."
  redis_url:
    name: Redis URL (optional)
    description: "Optionale Redis-URL fuer L1-Cache in verteilten Setups, z.B. redis://redis:6379."
  datenfresser_enabled:
    name: Datenfresser aktivieren
    description: "Aktiviert den Folder-Watcher fuer automatische Dokumentenverarbeitung."
  datenfresser_path:
    name: Datenfresser Inbox-Pfad
    description: "Ordner der auf neue Dokumente ueberwacht wird. Standard: /share/datenfresser/inbox"
  datenfresser_duplicates_path:
    name: Datenfresser Duplikate-Pfad
    description: "Ordner fuer erkannte Duplikate. Standard: /share/datenfresser/duplicates"
  datenfresser_poll_interval:
    name: Datenfresser Poll-Intervall (Sekunden)
    description: "Wie oft (in Sekunden) der Inbox-Ordner geprueft wird. Standard: 30."
  saned_net_hosts:
    name: SANE-Netzwerk-Hosts
    description: Per Semikolon getrennte Hosts, die an /etc/sane.d/net.conf angehaengt werden.
  airscan_devices:
    name: Airscan-Geraete
    description: Per Semikolon getrennte Eintraege fuer /etc/sane.d/airscan.conf.
  scanimage_list_ignore:
    name: scanimage-Liste ignorieren
    description: Aktiviert bei Bedarf die scanimage-Umgebungsoption zum Ignorieren der Geraeteliste.
  devices:
    name: Geraetefilter
    description: Optionaler Scanner-Filter, der an scanservjs weitergereicht wird.
  ocr_lang:
    name: OCR-Sprachen
    description: Tesseract-OCR-Sprachen, zum Beispiel deu+eng.
  copy_scans_to_mode:
    name: Zielverzeichnis-Modus
    description: auto erkennt /share/paperless/consume, paperless erzwingt es, custom nutzt das Wunschverzeichnis.
  copy_scans_to:
    name: Wunschverzeichnis fuer Scans
    description: Zielverzeichnis fuer fertige Scans bei custom oder als Fallback bei auto.
  generic_scanner_ip:
    name: Generische Scanner-IP (AirScan Fallback)
    description: Optionale Scanner-IP fuer automatische eSCL/WSD-Eintraege, wenn airscan_devices leer ist. Geeignet fuer HP/Epson/Canon/Xerox MFP ohne Brother-Modus.
  custom_tags_rules:
    name: Zusaetzliche Tag-Regeln
    description: "Einzeilige Zusatzregeln fuer die KI-Tag-Erkennung, z.B. 'Rechnungen von Telekom immer Tag [Telekommunikation]'. Fuer umfangreiche Aenderungen die Datei /share/scanservjs-ai/prompt_tags.txt bearbeiten."
  custom_filename_rules:
    name: Zusaetzliche Dateinamen-Regeln
    description: "Einzeilige Zusatzregeln fuer die KI-Dateinamen-Erzeugung, z.B. 'Arztbriefe immer Kategorie Arzt'. Fuer umfangreiche Aenderungen die Datei /share/scanservjs-ai/prompt_dateiname.txt bearbeiten."
  reset_prompts_to_default:
    name: KI-Prompts zuruecksetzen
    description: "Setzt beim naechsten Addon-Neustart die Prompt-Dateien unter /share/scanservjs-ai/ auf den Standard zurueck. Achtung: eigene Aenderungen gehen verloren. Nach dem Neustart wieder deaktivieren."
  brother_enable:
    name: Brother-Unterstuetzung aktivieren
    description: Aktiviert die optionale Brother-brscan4-Logik.
  brother_accept_eula:
    name: Brother-EULA akzeptieren
    description: Muss aktiviert sein, bevor proprietaere Brother-Treiber heruntergeladen oder installiert werden.
  brother_driver_source:
    name: Brother-Treiberquelle
    description: Waehlt automatische Aufloesung, eine URL oder eine lokale Datei.
  brother_driver_url:
    name: Brother-Treiber-URL
    description: Direkte URL zu einem Brother-brscan4-Debian-Paket.
  brother_driver_sha256:
    name: Brother-Treiber-SHA256
    description: Optionaler SHA256-Pruefwert fuer das heruntergeladene Paket.
  brother_driver_local_path:
    name: Brother-Treiber lokaler Pfad
    description: Lokaler Pfad zu einem Brother-brscan4-Debian-Paket, zum Beispiel unter /share.
  brother_register_scanner:
    name: Brother-Scanner registrieren
    description: Fuehrt beim Start die brsaneconfig4-Registrierung aus.
  brother_scanner_name:
    name: Brother-Scannername
    description: Registrierungsname fuer den Brother-Scanner.
  brother_scanner_model:
    name: Brother-Scannermodell
    description: Brother-Modellbezeichnung fuer brsaneconfig4.
  brother_scanner_ip:
    name: Brother-Scanner-IP
    description: IP-Adresse fuer die Brother-Netzwerkregistrierung.
  brother_scanner_nodename:
    name: Brother-Scanner-Nodename
    description: Optionaler Nodename anstelle einer IP-Adresse.
  brother_overwrite_existing:
    name: Vorhandene Brother-Registrierung ueberschreiben
    description: Entfernt einen vorhandenen Brother-Eintrag vor der Neuregistrierung.
  brother_button_output_dir:
    name: Brother-Button-Ausgabeverzeichnis
    description: Optionales Verzeichnis fuer Brother-Button-Scans. Leer = scanservjs Datenordner (sichtbar unter Dateien-Tab).
  brother_button_default_resolution:
    name: Brother-Standardauflosung (DPI)
    description: "Standard-DPI fuer Brother-Button-Scans, wenn im Brother-Profil keine Aufloesung gesetzt ist. Empfehlung fuer OCR: 300 (600 nur fuer sehr kleine Schrift)."
  brother_button_scan_format:
    name: Brother-Tasten Scanformat
    description: Ausgabeformat fuer Brother Scan to File und Scan to Email, z.B. jpeg oder png. Fuer Paperless sind 300dpi und eher kompakte Formate sinnvoll.
  brother_image_output_format:
    name: Brother Image-Ausgabeformat
    description: Ausgabeformat fuer Brother Scan to Image (native, jpg, pdf, tiff).
  brother_ocr_output_format:
    name: Brother OCR-Ausgabeformat
    description: Ausgabeformat fuer Brother Scan to OCR (native, jpg, pdf, tiff).
  brother_copy_file_to_target:
    name: File nach Ziel kopieren
    description: true = Scan to File wird nach copy_scans_to kopiert (z.B. Paperless).
  brother_copy_email_to_target:
    name: Email nach Ziel kopieren
    description: true = Scan to Email wird nach copy_scans_to kopiert.
  brother_copy_image_to_target:
    name: Image nach Ziel kopieren
    description: false = Image bleibt im scanservjs Dateien-Tab; true = auch nach copy_scans_to kopieren.
  brother_copy_ocr_to_target:
    name: OCR nach Ziel kopieren
    description: false = OCR bleibt im scanservjs Dateien-Tab; true = auch nach copy_scans_to kopieren.
  brother_button_scan_args_file:
    name: Brother-Datei-Taste Scanargumente
    description: Optionale zusaetzliche scanimage-Argumente fuer Scan to File, durch Leerzeichen getrennt.
  brother_button_scan_args_email:
    name: Brother-E-Mail-Taste Scanargumente
    description: Optionale zusaetzliche scanimage-Argumente fuer Scan to Email, durch Leerzeichen getrennt.
  brother_trigger_image_webhook_id:
    name: Brother-Image-Webhook-ID
    description: Optionale Home-Assistant-Webhook-ID fuer die Brother-Taste Scan to Image.
  brother_trigger_ocr_webhook_id:
    name: Brother-OCR-Webhook-ID
    description: Optionale Home-Assistant-Webhook-ID fuer die Brother-Taste Scan to OCR.
