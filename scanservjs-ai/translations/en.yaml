configuration:
  claude_access_type:
    name: Claude access type
    description: "Type of Claude access: api_key for API key, subscription for existing Claude subscription, none to disable."
  anthropic_api_key:
    name: Anthropic API key
    description: "API key for Claude AI. Required when claude_access_type is set to api_key."
  paperless_url:
    name: Paperless-ngx URL
    description: "URL to the Paperless-ngx instance, e.g. http://ca5234a0-paperless-ngx:8000"
  paperless_token:
    name: Paperless-ngx token
    description: "API token for Paperless-ngx (generate under Admin > API Tokens)."
  min_konfidenz:
    name: Minimum AI confidence
    description: "Threshold (0.0-1.0) above which AI classification is considered reliable. Below this value a [Review] tag is set."
  ai_poll_interval:
    name: AI poll interval (minutes)
    description: "How often (in minutes) to check for new documents in Paperless. Default: 5."
  ha_url:
    name: Home Assistant URL
    description: "URL to the Home Assistant instance. Automatically set via Supervisor."
  ha_token:
    name: Home Assistant token
    description: "Long-lived access token for HA. Automatically set via Supervisor."
  ha_notify_target:
    name: HA notification target
    description: "Notify service for AI notifications, e.g. notify.persistent_notification or notify.mobile_app_phone."
  ha_automation_entity_id:
    name: HA automation entity ID
    description: "Optional entity ID of an HA automation triggered on new documents."
  cache_enabled:
    name: Enable AI cache
    description: "Enables the classification cache (SQLite). Reduces API calls for repeated documents."
  cache_db_path:
    name: Cache database path
    description: "Path to the SQLite cache database. Default: /data/cache_classifications.db"
  cache_ttl_seconds:
    name: Cache TTL (seconds)
    description: "Validity period of cached classifications in seconds. Default: 86400 (24 hours)."
  redis_url:
    name: Redis URL (optional)
    description: "Optional Redis URL for L1 cache in distributed setups, e.g. redis://redis:6379."
  datenfresser_enabled:
    name: Enable Datenfresser
    description: "Enables the folder watcher for automatic document processing."
  datenfresser_path:
    name: Datenfresser inbox path
    description: "Folder monitored for new documents. Default: /share/datenfresser/inbox"
  datenfresser_duplicates_path:
    name: Datenfresser duplicates path
    description: "Folder for detected duplicates. Default: /share/datenfresser/duplicates"
  datenfresser_poll_interval:
    name: Datenfresser poll interval (seconds)
    description: "How often (in seconds) the inbox folder is checked. Default: 30."
  datenfresser_errors_path:
    name: Datenfresser errors path
    description: "Path for files that failed OCR after multiple retries. Default: /share/datenfresser/errors"
  datenfresser_unsupported_path:
    name: Datenfresser unsupported path
    description: "Path for files with unsupported formats. Default: /share/datenfresser/unsupported"
  saned_net_hosts:
    name: SANE network hosts
    description: Semicolon-separated hosts appended to /etc/sane.d/net.conf.
  airscan_devices:
    name: Airscan devices
    description: Semicolon-separated entries inserted into /etc/sane.d/airscan.conf.
  scanimage_list_ignore:
    name: Ignore scanimage list
    description: Enables the scanimage list ignore environment flag when needed.
  devices:
    name: Device filter
    description: Optional scanner device filter forwarded to scanservjs.
  ocr_lang:
    name: OCR languages
    description: Tesseract OCR languages, for example deu+eng.
  copy_scans_to_mode:
    name: Scan target mode
    description: auto detects /share/paperless/consume, paperless forces it, custom uses the custom path.
  copy_scans_to:
    name: Custom scan target path
    description: Destination directory for completed scans in custom mode or as fallback in auto mode.
  generic_scanner_ip:
    name: Generic scanner IP (AirScan fallback)
    description: Optional scanner IP for automatic eSCL/WSD entries when airscan_devices is empty. Useful for HP/Epson/Canon/Xerox MFPs without Brother mode.
  custom_tags_rules:
    name: Additional tag rules
    description: "Single-line extra rules for AI tag extraction, e.g. 'Invoices from Telekom always tag [Telecom]'. For extensive changes edit /share/scanservjs-ai/prompt_tags.txt directly."
  custom_filename_rules:
    name: Additional filename rules
    description: "Single-line extra rules for AI filename generation, e.g. 'Doctor letters always category Arzt'. For extensive changes edit /share/scanservjs-ai/prompt_dateiname.txt directly."
  reset_prompts_to_default:
    name: Reset AI prompts to default
    description: "On next addon restart, overwrites prompt files under /share/scanservjs-ai/ with defaults. Warning: custom changes will be lost. Disable again after restart."
  brother_enable:
    name: Enable Brother support
    description: Activates optional Brother brscan4 setup logic.
  brother_accept_eula:
    name: Accept Brother EULA
    description: Must be enabled before downloading or installing proprietary Brother drivers.
  brother_driver_source:
    name: Brother driver source
    description: Choose whether the Brother driver is resolved automatically, from a URL, or from a local file.
  brother_driver_url:
    name: Brother driver URL
    description: Direct URL to a Brother brscan4 Debian package.
  brother_driver_sha256:
    name: Brother driver SHA256
    description: Optional SHA256 checksum used to verify the downloaded package.
  brother_driver_local_path:
    name: Brother driver local path
    description: Local path to a Brother brscan4 Debian package, for example under /share.
  brother_register_scanner:
    name: Register Brother scanner
    description: Runs brsaneconfig4 registration during startup.
  brother_scanner_name:
    name: Brother scanner name
    description: Registration name for the Brother scanner.
  brother_scanner_model:
    name: Brother scanner model
    description: Brother model string used by brsaneconfig4.
  brother_scanner_ip:
    name: Brother scanner IP
    description: IP address used for Brother network registration.
  brother_scanner_nodename:
    name: Brother scanner nodename
    description: Optional nodename used instead of an IP address.
  brother_overwrite_existing:
    name: Overwrite Brother registration
    description: Removes an existing Brother entry before re-registering it.
  brother_button_output_dir:
    name: Brother button output directory
    description: Optional output directory for Brother button scans. Empty uses the scanservjs data folder (visible in the Files tab).
  brother_scan_source:
    name: Scan source (Flatbed/ADF)
    description: "FB = Flatbed (single page), ADF = Multi-page mode. Tries the automatic document feeder first (up to 35 pages). If no ADF is detected or ADF fails, falls back to a single flatbed scan. All ADF pages are merged into one PDF."
  brother_multipage_wait:
    name: Next page wait time (seconds)
    description: "Reserved for future use. Default: 30."
  brother_button_default_resolution:
    name: Brother default resolution (DPI)
    description: "Default DPI for Brother button scans when no profile resolution is set. OCR recommendation: 300 (use 600 only for very small text)."
  brother_button_scan_format:
    name: Brother button scan format
    description: Output format used by Brother Scan to File and Scan to Email button actions, for example jpeg or png. For paperless setups, 300dpi and compact formats are usually best.
  brother_image_output_format:
    name: Brother image output format
    description: Output format for Brother Scan to Image (native, jpg, pdf, tiff).
  brother_ocr_output_format:
    name: Brother OCR output format
    description: Output format for Brother Scan to OCR (native, jpg, pdf, tiff).
  brother_copy_file_to_target:
    name: Copy file to target
    description: true = copy Brother Scan to File output to copy_scans_to (for example Paperless).
  brother_copy_email_to_target:
    name: Copy email to target
    description: true = copy Brother Scan to Email output to copy_scans_to.
  brother_copy_image_to_target:
    name: Copy image to target
    description: false = keep Image in scanservjs Files tab; true = also copy to copy_scans_to.
  brother_copy_ocr_to_target:
    name: Copy OCR to target
    description: false = keep OCR in scanservjs Files tab; true = also copy to copy_scans_to.
  brother_button_scan_args_file:
    name: Brother file button scan args
    description: Optional extra scanimage arguments for the Brother Scan to File button, separated by spaces.
  brother_button_scan_args_email:
    name: Brother email button scan args
    description: Optional extra scanimage arguments for the Brother Scan to Email button, separated by spaces.
  brother_trigger_image_webhook_id:
    name: Brother image webhook ID
    description: Optional Home Assistant webhook ID triggered by the Brother Scan to Image button.
  brother_trigger_ocr_webhook_id:
    name: Brother OCR webhook ID
    description: Optional Home Assistant webhook ID triggered by the Brother Scan to OCR button.
