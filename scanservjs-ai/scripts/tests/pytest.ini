[pytest]
# pytest Konfiguration für KI-Module Tests

# Test-Verzeichnisse
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ausgabe-Optionen
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    unit: Unit-Tests für einzelne Funktionen
    integration: Integration-Tests mit echten APIs
    slow: Langsame Tests (>1s)
    mock: Tests mit Mocks (kein echter API-Call)

# Timeout für Tests (Sekunden)
timeout = 10

# Asyncio Mode (falls nötig)
asyncio_mode = auto

# Logging
log_cli = false
log_cli_level = WARNING
