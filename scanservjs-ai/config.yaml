name: "scanservjs + KI (Paperless-AI)"
version: "2.3.2"
slug: "scanservjs_ai"
description: "Scanner Web-UI mit automatischer KI-Dokumentenklassifikation. Scans landen direkt in Paperless-ngx – Titel, Tags und Korrespondenten werden automatisch per Claude AI vergeben."
url: "https://github.com/magicx78/ha-scanservjs-addon"

arch:
  - amd64

init: false
startup: services
boot: auto

ingress: true
ingress_port: 8080
panel_icon: "mdi:scanner"
panel_title: "scanservjs KI"
host_network: true

ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "scanservjs KI Web interface"

icon: icon.png
logo: icon.png
apparmor: false
usb: true
homeassistant_api: true

map:
  - type: ssl
  - type: share
    read_only: false
  - type: media
    read_only: false

options:
  # --- KI / Claude API -------------------------------------------
  claude_access_type: "api_key"
  anthropic_api_key: ""
  paperless_url: "http://ca5234a0-paperless-ngx:8000"
  paperless_token: ""
  min_konfidenz: 0.7
  ai_poll_interval: 5

  # --- KI-Prompt Anpassung ----------------------------------------
  custom_tags_rules: ""
  custom_filename_rules: ""
  reset_prompts_to_default: false

  # --- Home Assistant Integration --------------------------------
  ha_url: "http://homeassistant.local:8123"
  ha_token: ""
  ha_notify_target: "notify.persistent_notification"
  ha_automation_entity_id: ""

  # --- Caching (Performance) -------------------------------------
  cache_enabled: true
  cache_db_path: "/data/cache_classifications.db"
  cache_ttl_seconds: 86400
  redis_url: ""

  # --- Datenfresser (Folder Watcher) --------------------------------
  datenfresser_enabled: true
  datenfresser_path: "/share/datenfresser/inbox"
  datenfresser_duplicates_path: "/share/datenfresser/duplicates"
  datenfresser_poll_interval: 30

  # --- Scanner ---------------------------------------------------
  saned_net_hosts: ""
  airscan_devices: ""
  scanimage_list_ignore: false
  devices: ""
  ocr_lang: "deu+eng"
  copy_scans_to_mode: "custom"
  copy_scans_to: "/share/paperless/consume"
  generic_scanner_ip: ""

  # --- Brother brscan4 ------------------------------------------
  brother_enable: false
  brother_accept_eula: false
  brother_driver_source: "auto"
  brother_driver_url: ""
  brother_driver_sha256: ""
  brother_driver_local_path: "/share/brscan4.amd64.deb"

  brother_register_scanner: true
  brother_scanner_name: "Brother"
  brother_scanner_model: "MFC-L2700DW"
  brother_scanner_ip: ""
  brother_scanner_nodename: ""
  brother_overwrite_existing: false
  brother_button_output_dir: ""
  brother_scan_source: "ADF"
  brother_multipage_wait: 30
  brother_button_default_resolution: 300
  brother_button_scan_format: "jpeg"
  brother_image_output_format: "jpg"
  brother_ocr_output_format: "pdf"
  brother_copy_file_to_target: true
  brother_copy_email_to_target: true
  brother_copy_image_to_target: false
  brother_copy_ocr_to_target: true
  brother_button_scan_args_file: ""
  brother_button_scan_args_email: ""
  brother_trigger_image_webhook_id: ""
  brother_trigger_ocr_webhook_id: ""

schema:
  # --- KI / Claude API -------------------------------------------
  claude_access_type: list(api_key|subscription|none)?
  anthropic_api_key: str?
  paperless_url: str?
  paperless_token: str?
  min_konfidenz: float?
  ai_poll_interval: int?

  # --- KI-Prompt Anpassung ----------------------------------------
  custom_tags_rules: str?
  custom_filename_rules: str?
  reset_prompts_to_default: bool?

  # --- Home Assistant Integration --------------------------------
  ha_url: str?
  ha_token: str?
  ha_notify_target: str?
  ha_automation_entity_id: str?

  # --- Caching (Performance) -------------------------------------
  cache_enabled: bool?
  cache_db_path: str?
  cache_ttl_seconds: int?
  redis_url: str?

  # --- Datenfresser (Folder Watcher) --------------------------------
  datenfresser_enabled: bool?
  datenfresser_path: str?
  datenfresser_duplicates_path: str?
  datenfresser_poll_interval: int?

  # --- Scanner ---------------------------------------------------
  saned_net_hosts: str?
  airscan_devices: str?
  scanimage_list_ignore: bool?
  devices: str?
  ocr_lang: str?
  copy_scans_to_mode: list(auto|paperless|custom)?
  copy_scans_to: str?
  generic_scanner_ip: str?

  # --- Brother ---------------------------------------------------
  brother_enable: bool?
  brother_accept_eula: bool?
  brother_driver_source: list(auto|url|local)?
  brother_driver_url: str?
  brother_driver_sha256: str?
  brother_driver_local_path: str?
  brother_register_scanner: bool?
  brother_scanner_name: str?
  brother_scanner_model: str?
  brother_scanner_ip: str?
  brother_scanner_nodename: str?
  brother_overwrite_existing: bool?
  brother_button_output_dir: str?
  brother_scan_source: list(FB|ADF)?
  brother_multipage_wait: int?
  brother_button_default_resolution: int?
  brother_button_scan_format: str?
  brother_image_output_format: list(native|jpg|pdf|tiff)?
  brother_ocr_output_format: list(native|jpg|pdf|tiff)?
  brother_copy_file_to_target: bool?
  brother_copy_email_to_target: bool?
  brother_copy_image_to_target: bool?
  brother_copy_ocr_to_target: bool?
  brother_button_scan_args_file: str?
  brother_button_scan_args_email: str?
  brother_trigger_image_webhook_id: str?
  brother_trigger_ocr_webhook_id: str?
