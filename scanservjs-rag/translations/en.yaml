configuration:
  ollama_url:
    name: Ollama URL
    description: "URL of the Ollama server (e.g. http://homeassistant.local:11434)"
  ollama_embed_model:
    name: Embedding Model
    description: "Ollama model for embeddings (recommended: nomic-embed-text)"
  ollama_llm_model:
    name: LLM Model
    description: "Ollama model for answers (recommended: qwen2.5:14b)"
  anthropic_api_key:
    name: Anthropic API Key
    description: "Optional: Claude API key for cloud LLM fallback"
  use_claude:
    name: Use Claude API
    description: "Use Claude API instead of local Ollama for answers"
  watch_folder:
    name: Watch Folder
    description: "Folder to automatically watch for new documents (e.g. /share/paperless/consume)"
  max_results:
    name: Max Search Results
    description: "Maximum number of source chunks per search (1-10)"
  ocr_lang:
    name: OCR Languages
    description: "Tesseract OCR languages (e.g. deu+eng)"
