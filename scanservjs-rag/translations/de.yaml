configuration:
  ollama_url:
    name: Ollama URL
    description: "URL des Ollama-Servers (z.B. http://homeassistant.local:11434)"
  ollama_embed_model:
    name: Embedding-Modell
    description: "Ollama-Modell für Embeddings (empfohlen: nomic-embed-text)"
  ollama_llm_model:
    name: LLM-Modell
    description: "Ollama-Modell für Antworten (empfohlen: qwen2.5:14b)"
  anthropic_api_key:
    name: Anthropic API-Key
    description: "Optional: Claude API-Key für Cloud-LLM als Fallback"
  use_claude:
    name: Claude API verwenden
    description: "Claude API statt lokalem Ollama für Antworten nutzen"
  watch_folder:
    name: Überwachter Ordner
    description: "Ordner der automatisch auf neue Dokumente überwacht wird (z.B. /share/paperless/consume)"
  max_results:
    name: Max. Suchergebnisse
    description: "Maximale Anzahl Quelldokumente pro Suche (1-10)"
  ocr_lang:
    name: OCR-Sprachen
    description: "Tesseract OCR-Sprachen (z.B. deu+eng)"
