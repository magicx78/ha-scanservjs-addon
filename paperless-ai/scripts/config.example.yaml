# ============================================================
# Paperless-AI Consumption Script – Konfiguration (BEISPIEL)
# Kopieren und umbenennen: cp config.example.yaml config.yaml
# Niemals config.yaml commiten! (liegt in .gitignore)
# ============================================================

# --- Paperless-ngx ------------------------------------------
# URL des Paperless-Addon-Containers (intern)
paperless_url: "http://ca5234a0-paperless-ngx:8000"

# API-Token: Paperless -> Einstellungen -> API-Token generieren
paperless_token: "DEIN_PAPERLESS_API_TOKEN"

# --- Anthropic / Claude API ---------------------------------
# API-Key von https://console.anthropic.com
anthropic_api_key: "sk-ant-..."

# --- Home Assistant -----------------------------------------
# Interne HA-URL (kein Trailing-Slash)
ha_url: "http://homeassistant.local:8123"

# Long-Lived Access Token: HA -> Profil -> Sicherheit -> Token erstellen
ha_token: "DEIN_HA_LONG_LIVED_ACCESS_TOKEN"

# Notify-Ziel: "notify.<service>" aus HA Benachrichtigungen
# Beispiele: notify.mobile_app_iphone | notify.persistent_notification
ha_notify_target: "notify.mobile_app_iphone"

# --- Schwellenwerte -----------------------------------------
# Konfidenz unter diesem Wert -> Tag [Pruefen] + HA-Warnung
min_konfidenz: 0.7

# --- Logging ------------------------------------------------
# DEBUG | INFO | WARNING | ERROR
log_level: "INFO"
